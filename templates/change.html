{% extends "layout.html" %}

{% block title %}
    Change Password
{% endblock %}

{% block main %}
    <form action="/change" method="POST">
        <div class="mb-3">
            <input name="pass_old" class="form-control mx-auto w-auto" autocomplete="off" autofocus placeholder="Old Password" type="password">
        </div>
        <div class="mb-3">
            <input name="pass_new" class="form-control mx-auto w-auto" autocomplete="off" placeholder="New Password" type="password">
        </div>
        <div class="mb-3">
            <input name="confirm_new" class="form-control mx-auto w-auto" autocomplete="off" placeholder="Confirm new password" type="password">
        </div>
        <button class="btn btn-primary" type="submit">Change</button>
    </form>
{% endblock %}
